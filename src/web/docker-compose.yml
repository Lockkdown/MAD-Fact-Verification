services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - REPORTS_DIR=/reports
      - OPENROUTER_API_KEY
    volumes:
      - ../../reports:/reports:ro
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
