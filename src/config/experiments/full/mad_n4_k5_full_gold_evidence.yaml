debate:
  mode: "full_debate"
  rounds: 5
  early_stopping: true
  panel:
    debaters:
      - agent_id: "D1"
        model: "mistralai/mistral-small-2603"
      - agent_id: "D2"
        model: "openai/gpt-4o-mini"
      - agent_id: "D3"
        model: "qwen/qwen-2.5-72b-instruct"
      - agent_id: "D4"
        model: "meta-llama/llama-3.3-70b-instruct"
    judge:
      model: "deepseek/deepseek-chat"

routing:
  plm_checkpoint: "reports/models_plm/phobert/checkpoints/best_model.pt"
  threshold: null

data:
  split: "test"
  mode: "gold_evidence"
  batch_size: 10
  dev_path: "src/data/preprocessed/xlmr/vifactcheck_dev.jsonl"
  test_path: "src/data/preprocessed/xlmr/vifactcheck_test.jsonl"

output:
  log_path: "reports/debate/full/n4k5/logs.jsonl"
  metrics_path: "reports/debate/full/n4k5/metrics.json"
  viz_dir: "reports/debate/full/n4k5/visualizations/"
