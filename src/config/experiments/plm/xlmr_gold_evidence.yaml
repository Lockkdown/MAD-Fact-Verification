model:
  base_model: "xlm-roberta-base"
  num_classes: 3
  dropout_rate: 0.35
  unfreeze_last_n_layers: 8

data:
  mode: "gold_evidence"
  train_path: "src/data/preprocessed/xlmr/vifactcheck_train.jsonl"
  dev_path: "src/data/preprocessed/xlmr/vifactcheck_dev.jsonl"
  test_path: "src/data/preprocessed/xlmr/vifactcheck_test.jsonl"
  already_normalized: true
  max_length: 256

training:
  seed: 42
  epochs: 10
  batch_size: 16
  accumulation_steps: 1
  workers: 1
  learning_rate: 3.0e-5
  layer_decay: 0.9
  weight_decay: 0.05
  warmup_ratio: 0.1
  label_smoothing: 0.1
  patience: 3
  fp16: true

output:
  model_key:         "xlmr"
  checkpoint_dir:    "reports/models_plm/xlmr/checkpoints"
  train_metrics_dir: "reports/models_plm/xlmr/train/metrics"
  train_viz_dir:     "reports/models_plm/xlmr/train/visualizations"
  test_metrics_dir:  "reports/models_plm/xlmr/test/metrics"
  test_viz_dir:      "reports/models_plm/xlmr/test/visualizations"
