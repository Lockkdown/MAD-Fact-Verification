debate:
  mode: "hybrid_debate"
  rounds: 5
  early_stopping: true
  panel:
    debaters:
      - agent_id: "D1"
        model: "google/gemini-2.5-flash"
      - agent_id: "D2"
        model: "openai/gpt-4o-mini"
      - agent_id: "D3"
        model: "qwen/qwen-2.5-72b-instruct"
      - agent_id: "D4"
        model: "meta-llama/llama-3.3-70b-instruct"
    judge:
      model: "deepseek/deepseek-chat"

routing:
  plm_checkpoint: "reports/models_plm/phobert/checkpoints/best_model.pt"
  threshold: null

data:
  split: "test"
  mode: "gold_evidence"
  batch_size: 10

output:
  log_path: "reports/debate/hybrid/n4k5/logs.jsonl"
  metrics_path: "reports/debate/hybrid/n4k5/metrics.json"
  viz_dir: "reports/debate/hybrid/n4k5/visualizations/"
