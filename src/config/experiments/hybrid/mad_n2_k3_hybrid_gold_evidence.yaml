debate:
  mode: "hybrid_debate"
  rounds: 3
  early_stopping: true
  panel:
    debaters:
      - agent_id: "D1"
        model: "mistralai/mistral-small-2603"
      - agent_id: "D2"
        model: "openai/gpt-4o-mini"
    judge:
      model: "deepseek/deepseek-chat"

routing:
  plm_checkpoint: "reports/models_plm/phobert/checkpoints/best_model.pt"
  plm_model: "vinai/phobert-base"
  threshold: 0.85

data:
  split: "test"
  mode: "gold_evidence"
  batch_size: 10
  dev_path: "src/data/preprocessed/xlmr/vifactcheck_dev.jsonl"
  test_path: "src/data/preprocessed/xlmr/vifactcheck_test.jsonl"

output:
  log_path: "reports/debate/hybrid/n2k3/logs.jsonl"
  metrics_path: "reports/debate/hybrid/n2k3/metrics.json"
  viz_dir: "reports/debate/hybrid/n2k3/visualizations/"
