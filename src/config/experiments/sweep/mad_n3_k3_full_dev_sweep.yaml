debate:
  mode: "full_debate"
  rounds: 3
  early_stopping: true
  panel:
    debaters:
      - agent_id: "D1"
        model: "google/gemini-2.5-flash"
      - agent_id: "D2"
        model: "openai/gpt-4o-mini"
      - agent_id: "D3"
        model: "qwen/qwen-2.5-72b-instruct"
    judge:
      model: "deepseek/deepseek-chat"

routing:
  plm_checkpoint: "reports/models_plm/phobert/checkpoints/best_model.pt"
  threshold: null

data:
  split: "dev"
  mode: "gold_evidence"
  batch_size: 10
  dev_path: "src/data/preprocessed/xlmr/vifactcheck_dev.jsonl"
  test_path: "src/data/preprocessed/xlmr/vifactcheck_test.jsonl"

output:
  log_path: "reports/debate/sweep/n3k3/logs.jsonl"
  metrics_path: "reports/debate/sweep/n3k3/metrics.json"
  sweep_dir: "reports/debate/sweep/n3k3"
  viz_dir: "reports/debate/sweep/n3k3/visualizations/"
